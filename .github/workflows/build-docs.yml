name: Build docs

# data/articles.json（Cowork が更新）や src の変更で docs/ を再生成しコミットする。
# GitHub Pages は「Deploy from branch → /docs」で配信する前提。
on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit rebuilt docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs)" ]; then
            git add docs
            git commit -m "build: regenerate docs/ [skip ci]"
            git push
          else
            echo "docs/ に変更なし"
          fi
